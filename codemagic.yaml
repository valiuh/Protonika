workflows:
  android-tests:
    name: Android Tests
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - codemagic_api_credentials
      vars:
        DEPLOY_WORKFLOW_ID: android-build-deploy
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Stage 1.1 - Build environment diagnostics
        script: |
          set -euo pipefail
          rm -f gradle/gradle-daemon-jvm.properties
          java -version
          ./gradlew --version

      - name: Stage 1.2 - Run all unit and host tests
        script: |
          bash pipelines/scripts/android-tests-run-unit-host-tests.sh

      - name: Stage 1.3 - Run all UI tests
        script: |
          set -euo pipefail
          echo "Firebase Test Lab going to be used later."
          echo "Placeholder for future Firebase Test Lab execution."
          echo "Expected inputs: FIREBASE_PROJECT_ID, FIREBASE_SERVICE_ACCOUNT, test APK artifacts."

      - name: Stage 1.4 - Trigger deploy workflow on main after successful tests
        script: |
          bash pipelines/scripts/android-tests-trigger-deploy-on-main.sh

    artifacts:
      - build/reports/**/*
      - build/test-results/**/*
      - androidApp/build/reports/**/*
      - androidApp/build/test-results/**/*
      - shared/build/reports/**/*
      - shared/build/test-results/**/*
      - shared/VirtualMachine/build/reports/**/*
      - shared/VirtualMachine/build/test-results/**/*
      - shared/VirtualMachineCli/build/reports/**/*
      - shared/VirtualMachineCli/build/test-results/**/*

  android-build-deploy:
    name: Android Build and Firebase Deploy
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - firebase_distribution_credentials
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Stage 2.1 - Enforce main branch
        script: |
          set -euo pipefail
          if [ "${CM_BRANCH}" != "main" ]; then
            echo "This workflow is restricted to main. Current branch: ${CM_BRANCH}"
            exit 1
          fi

      - name: Stage 2.2 - Generate release notes from latest commit
        script: |
          set -euo pipefail
          git log -1 --pretty=format:"%h %s%n%n%b" > release_notes.txt
          echo "release_notes.txt generated"
          cat release_notes.txt

      - name: Stage 2.3 - Build Android debug APK
        script: |
          set -euo pipefail
          ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Stage 2.4 - Deploy Android debug APK to Firebase App Distribution
        script: |
          bash pipelines/scripts/android-deploy-firebase-app-distribution.sh

      - name: Stage 2.5 - Build Neutronika Mk-61 Virtual Machine JAR
        script: |
          set -euo pipefail
          ./gradlew :shared:VirtualMachineCli:fatJar --stacktrace
          ls -lah shared/VirtualMachineCli/build/libs

      - name: Stage 2.6 - Upload Neutronika Mk-61 Virtual Machine JAR to Firebase Storage
        script: |
          bash pipelines/scripts/android-upload-neutronika-jar-to-storage.sh

    artifacts:
      - release_notes.txt
      - androidApp/build/outputs/**/*.apk
      - shared/VirtualMachineCli/build/libs/*-all.jar
